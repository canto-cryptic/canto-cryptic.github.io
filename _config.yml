# Setup
title: canto.cryptic blog
tagline: linguistics · cantonese · rambles
url: https://canto-cryptic.github.io/
paginate: 4
baseurl: ""
permalink: pretty

future: false

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# ga_analytics: UA-000000-0

# Specify the author for blog posts
author:
  name: canto.cryptic
  url: https://www.threads.com/@canto.cryptic
  email: "`canto.cryptic+blog [at] gmail [dot] com`"

# Custom vars
version: 0.0.0
